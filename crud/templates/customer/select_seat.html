{% extends 'layout/base.html' %}
{% load static %}

{% block content %}
<div class="p-6 bg-gray-950 min-h-screen text-gray-100">
    <div class="max-w-[1300px] mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white">🥂 Choose Your Experience</h1>
                <p class="text-gray-400">Select an available table to begin your night at Celestia Rock.</p>
            </div>
            <div class="flex items-center gap-6 p-4 bg-gray-800 rounded-2xl border border-gray-700 shadow-xl">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-gray-300">Available</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,104,104,0.5)]"></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-gray-300">Occupied</span>
                </div>
            </div>
        </div>

        <!-- Floor Plan Area with Horizontal Scroll for Small Screens -->
        <div class="overflow-x-auto pb-4">
            <div id="floor-plan" class="relative border-4 border-white/10 bg-midnight rounded-3xl overflow-hidden shadow-2xl mb-12" 
                 style="width: 1200px; height: 800px; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px;">
            
            <!-- Environment Zones -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/3 h-32 bg-purple-900/20 border-b-4 border-purple-500/50 flex items-center justify-center text-purple-400 font-black tracking-[0.5em] backdrop-blur-sm">DJ BOOTH</div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-1/2 h-1/2 rounded-full border-4 border-dashed border-white/5 flex items-center justify-center pointer-events-none">
                <span class="text-white/5 text-6xl font-black tracking-widest uppercase rotate-12">Dance Floor</span>
            </div>
            <div class="absolute bottom-0 right-0 w-64 h-32 bg-cyan-900/20 border-l-4 border-t-4 border-cyan-500/50 flex items-center justify-center text-cyan-400 font-black tracking-widest backdrop-blur-sm rounded-tl-3xl">🍸 BAR</div>
            <div class="absolute bottom-10 left-10 w-40 h-20 bg-gray-800/40 border-2 border-gray-700 flex items-center justify-center text-gray-500 font-bold uppercase tracking-widest rounded-xl">Entrance</div>

            <!-- Seats -->
            {% for seat in seats %}
                <form method="post" class="absolute seat-form" style="left: {{ seat.x_coord }}px; top: {{ seat.y_coord }}px;">
                    {% csrf_token %}
                    <input type="hidden" name="seat_id" value="{{ seat.id }}">
                    <button type="submit" {% if seat.is_occupied %}disabled{% endif %}
                            class="group relative flex flex-col items-center justify-center transition-all duration-300 transform hover:scale-110 active:scale-95
                                   {% if seat.is_occupied %}cursor-not-allowed grayscale opacity-60{% else %}cursor-pointer{% endif %}">
                        
                        <div class="w-20 h-20 rounded-2xl border-2 flex flex-col items-center justify-center transition-all duration-300 shadow-2xl relative
                                    {% if seat.is_occupied %}border-red-500 bg-red-950/40 shadow-red-500/20{% else %}border-green-500 bg-green-950/40 shadow-green-500/20 hover:border-gold hover:shadow-gold/30{% endif %}">
                            <span class="text-2xl mb-1">{% if seat.seat_type == 'vip' %}🍾{% elif seat.seat_type == 'bar' %}🥃{% else %}🪑{% endif %}</span>
                            <span class="text-[10px] font-black uppercase tracking-wider text-white">{{ seat.seat_number }}</span>
                        </div>
                        
                        <span class="mt-2 text-[8px] font-black uppercase tracking-widest 
                                     {% if seat.is_occupied %}text-red-400{% else %}text-green-400 group-hover:text-gold{% endif %}">
                            {% if seat.is_occupied %}Occupied{% else %}Select Table{% endif %}
                        </span>
                    </button>
                </form>
            {% endfor %}
        </div>
    </div>
</div>

<style>
    .bg-midnight { background-color: #0f172a; }
    .seat-form { z-index: 10; }
    .seat-form:hover { z-index: 20; }
</style>
{% endblock %}
