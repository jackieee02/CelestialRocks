{% extends 'layout/base.html' %}

{% block content %}
<div class="p-6 bg-gray-900 min-h-screen text-gray-100">
    <h1 class="text-3xl font-bold mb-6 text-primary">Club Floor Layout Designer</h1>
    
    <!-- Floor Plan Area -->
    <div id="floor-plan" class="relative border-4 border-gray-700 bg-gray-950 rounded-lg overflow-hidden cursor-crosshair" style="width: 100%; height: 700px;">
        
        <!-- Environment Elements -->
        <div class="absolute top-10 left-10 w-40 h-24 bg-gray-800 border-2 border-purple-500 flex items-center justify-center text-purple-400 font-bold">DJ BOOTH</div>
        <div class="absolute top-20 right-20 w-32 h-64 bg-gray-800 border-2 border-gray-600 flex items-center justify-center text-gray-500 font-bold">BAR</div>
        
        <!-- Seats -->
        {% for seat in seats %}
            <div class="absolute w-16 h-16 rounded-full flex items-center justify-center text-xs shadow-lg seat 
                        {% if seat.is_occupied %}bg-red-600{% else %}bg-green-600{% endif %}" 
                 data-seat-id="{{ seat.id }}" 
                 style="left: {{ seat.x_coord }}px; top: {{ seat.y_coord }}px;"
                 draggable="true">
                {{ seat.seat_number }}
            </div>
        {% endfor %}
    </div>
</div>

<script>
    const floorPlan = document.getElementById('floor-plan');
    let activeSeat = null;

    floorPlan.addEventListener('dragover', (e) => e.preventDefault());

    document.querySelectorAll('.seat').forEach(seat => {
        seat.addEventListener('dragstart', (e) => {
            activeSeat = seat;
        });
    });

    floorPlan.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!activeSeat) return;

        const rect = floorPlan.getBoundingClientRect();
        const x = e.clientX - rect.left - (activeSeat.offsetWidth / 2);
        const y = e.clientY - rect.top - (activeSeat.offsetHeight / 2);

        activeSeat.style.left = x + 'px';
        activeSeat.style.top = y + 'px';

        // Update server
        fetch(`/admin/seats/update-pos/${activeSeat.dataset.seatId}/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ x: Math.round(x), y: Math.round(y) })
        });
    });
</script>
{% endblock %}
