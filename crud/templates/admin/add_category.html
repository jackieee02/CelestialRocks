{% extends 'layout/base.html' %}

{% block content %}
<div class="p-6 bg-gray-900 min-h-screen text-gray-100">
    <!-- Hero Header -->
    <div class="bg-linear-to-r from-purple-700 to-yellow-600 rounded-2xl p-8 mb-8 text-white shadow-lg">
        <h1 class="text-4xl font-bold mb-2">📂 Add Category</h1>
        <p class="text-lg opacity-90">Create and organize menu categories for Celestia Rock.</p>
    </div>

    <!-- Form Container -->
    <div class="max-w-2xl mx-auto bg-gray-800 rounded-xl shadow-lg p-8 border border-gray-700">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <!-- Category Name -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Category Name</label>
                {{ form.name }}
            </div>

            <!-- Description (Assuming we add this to model later or just a placeholder for now) -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
                <textarea name="description" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500" rows="4"></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-end gap-4 mt-8">
                <a href="{% url 'manage_menu' %}" class="px-6 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg transition">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-yellow-600 hover:bg-yellow-700 text-white font-bold rounded-lg transition">Save Category</button>
            </div>
        </form>
    </div>
</div>

<style>
    input[type="text"], textarea {
        width: 100%;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background-color: #374151;
        border: 1px solid #4b5563;
        color: white;
    }
    input:focus, textarea:focus { outline: 2px solid #d4af37; }
</style>
{% endblock %}
