{% extends 'layout/base.html' %}

{% block content %}
<section class="mx-auto max-w-6xl space-y-6">
    <div class="rounded-lg border border-white/10 bg-white/[0.04] p-6 shadow-2xl shadow-black/20">
        <div class="flex items-center justify-between gap-4">
            <div>
                <p class="text-sm font-bold uppercase tracking-[0.3em] text-gold">Seat Management</p>
                <h1 class="mt-2 text-4xl font-black text-white">Seats</h1>
            </div>
            <a href="{% url 'add_seat' %}" class="rounded-full bg-secondary px-4 py-2 text-sm font-black text-white">Add Seat</a>
        </div>
    </div>

    <div class="overflow-hidden rounded-lg border border-white/10 bg-white/[0.04] shadow-xl shadow-black/20">
        <table class="w-full text-left">
            <thead>
                <tr>
                    <th class="p-4">Seat Number</th>
                    <th class="p-4">Status</th>
                    <th class="p-4">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/10">
                {% for seat in seats %}
                <tr>
                    <td class="p-4 font-semibold text-white">{{ seat.seat_number }}</td>
                    <td class="p-4">
                        <span class="rounded-full border px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] {% if seat.is_active %}border-primary/30 bg-primary/10 text-primary{% else %}border-alert/30 bg-alert/10 text-alert{% endif %}">
                            {% if seat.is_active %}Active{% else %}Inactive{% endif %}
                        </span>
                    </td>
                    <td class="p-4">
                        <a href="{% url 'edit_seat' seat.id %}" class="mr-3 rounded-md border border-white/10 px-3 py-1.5 text-sm font-semibold text-slate-200 transition hover:bg-white/10">Edit</a>
                        <a href="{% url 'delete_seat' seat.id %}" class="rounded-md border border-alert/30 bg-alert/10 px-3 py-1.5 text-sm font-semibold text-alert transition hover:bg-alert hover:text-white">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="p-6 text-slate-400">No seats found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
