{% extends 'layout/base.html' %}
{% block content %}
<div class="p-6 bg-gray-900 min-h-screen text-gray-100">
    <div class="bg-gradient-to-r from-purple-700 to-yellow-600 rounded-2xl p-8 mb-8 text-white shadow-lg">
        <h1 class="text-4xl font-bold mb-2">✏ Edit Drink</h1>
    </div>
    <div class="max-w-4xl mx-auto bg-gray-800 rounded-xl shadow-lg p-8 border border-gray-700">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 [&_input]:w-full [&_input]:p-3 [&_input]:rounded-lg [&_input]:bg-gray-700 [&_input]:border [&_input]:border-gray-600 [&_input]:text-white [&_select]:w-full [&_select]:p-3 [&_select]:rounded-lg [&_select]:bg-gray-700 [&_select]:border [&_select]:border-gray-600 [&_select]:text-white [&_label]:block [&_label]:text-sm [&_label]:font-medium [&_label]:text-gray-300 [&_label]:mb-2">
                <div>{{ form.as_p }}</div>
            </div>
            {% if drink.image %}
            <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                <p class="text-xs text-gray-400 mb-2">Current Image</p>
                <img src="{{ drink.image.url }}" alt="{{ drink.name }}" class="w-32 h-32 object-cover rounded">
            </div>
            {% endif %}
            <div class="flex justify-end gap-4 mt-8">
                <a href="{% url 'manage_menu' %}" class="px-6 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg transition">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-yellow-600 hover:bg-yellow-700 text-white font-bold rounded-lg transition">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
